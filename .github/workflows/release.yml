name: Android release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read app version
        id: app_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x ./gradlew
          VERSION_NAME="$(./gradlew -q :app:printVersionName)"
          if [[ "$VERSION_NAME" == v* || "$VERSION_NAME" == V* ]]; then
            TAG_NAME="$VERSION_NAME"
          else
            TAG_NAME="v$VERSION_NAME"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG_NAME already exists. Nothing to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG_NAME does not exist yet. Building it now."
          fi

      - name: Decode release keystore
        if: steps.app_version.outputs.exists == 'false'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::Missing RELEASE_KEYSTORE_BASE64 repository secret"
            exit 1
          fi
          if [ -z "$RELEASE_KEYSTORE_PASSWORD" ]; then
            echo "::error::Missing RELEASE_KEYSTORE_PASSWORD repository secret"
            exit 1
          fi
          if [ -z "$RELEASE_KEY_ALIAS" ]; then
            echo "::error::Missing RELEASE_KEY_ALIAS repository secret"
            exit 1
          fi

          KEY_PASSWORD="${RELEASE_KEY_PASSWORD:-$RELEASE_KEYSTORE_PASSWORD}"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release-keystore.jks"
          {
            printf '%s\n' "storeFile=$GITHUB_WORKSPACE/release-keystore.jks"
            printf '%s\n' "storePassword=$RELEASE_KEYSTORE_PASSWORD"
            printf '%s\n' "keyAlias=$RELEASE_KEY_ALIAS"
            printf '%s\n' "keyPassword=$KEY_PASSWORD"
          } > "$GITHUB_WORKSPACE/keystore.properties"

      - name: Build signed release APK
        if: steps.app_version.outputs.exists == 'false'
        run: ./gradlew :app:assembleRelease

      - name: Create GitHub release
        if: steps.app_version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.app_version.outputs.tag_name }}
          VERSION_NAME: ${{ steps.app_version.outputs.version_name }}
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' -print -quit)"
          if [ -z "$APK_PATH" ]; then
            echo "::error::Release APK was not produced"
            exit 1
          fi

          gh release create "$TAG_NAME" \
            "$APK_PATH#QuickSale-$TAG_NAME.apk" \
            --title "QuickSale $VERSION_NAME" \
            --generate-notes \
            --target "$GITHUB_SHA"
